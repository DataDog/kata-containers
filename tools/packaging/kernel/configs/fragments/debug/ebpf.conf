# eBPF / Tracing

# Loadable module support — prerequisite for BPF_JIT (depends on MODULES) and
# for any kmod-based debug tooling.
CONFIG_MODULES=y
CONFIG_MODULE_COMPRESS_NONE=y
CONFIG_OID_REGISTRY=y

# Generate BTF type info
CONFIG_DEBUG_INFO_BTF=y

# JIT compile the program
CONFIG_BPF_JIT=y
CONFIG_BPF_JIT_ALWAYS_ON=y
CONFIG_BPF_JIT_DEFAULT_ON=y

# Allow the user to attach BPF programs to kprobe, uprobe, and tracepoint events
CONFIG_BPF_EVENTS=y

# Kernel probes
CONFIG_KPROBES=y
CONFIG_KPROBE_EVENTS=y
CONFIG_KRETPROBES=y

# Userspace probes
CONFIG_UPROBES=y
CONFIG_UPROBE_EVENTS=y

# Tracing infrastructure
CONFIG_TRACEPOINTS=y
CONFIG_TRACING=y
CONFIG_EVENT_TRACING=y
CONFIG_GENERIC_TRACER=y
CONFIG_RING_BUFFER=y
CONFIG_DYNAMIC_EVENTS=y
CONFIG_PROBE_EVENTS=y
CONFIG_BRANCH_PROFILE_NONE=y

# ftrace infrastructure
CONFIG_DYNAMIC_FTRACE=y
CONFIG_DYNAMIC_FTRACE_WITH_DIRECT_CALLS=y
CONFIG_DYNAMIC_FTRACE_WITH_ARGS=y
CONFIG_FTRACE=y
CONFIG_FTRACE_SYSCALLS=y
CONFIG_FUNCTION_TRACER=y
CONFIG_FUNCTION_GRAPH_TRACER=y
