# PVH (Paravirtualized Hardware) direct kernel boot entry point.
#
# With PVH, QEMU loads a bzImage directly via the PVH ELF note and bypasses
# SeaBIOS kernel-loading entirely. This removes the dependency on
# linuxboot_dma.bin (the SeaBIOS option ROM used to load Linux kernels on q35),
# which is present in the kata-static tarball but need not be extracted or
# present at runtime.
#
# Without PVH (e.g. linuxboot_dma.bin missing from the QEMU firmware search
# path), SeaBIOS falls back to disk-boot, Linux never starts, the kata-agent
# never connects via vsock, and the container fails with a 45 s timeout.
#
# CONFIG_PVH is already set in x86_64/base.conf; this entry ensures it wins
# over the 'n' default that make oldconfig assigns to new options when starting
# from the legacy 4.14.x base config.
CONFIG_PVH=y
