# e2e fixture: a Kata pod with one host-side sidecar and one in-VM workload.
# The sidecar is a KEP-753 native sidecar (init container, restartPolicy: Always)
# named in the host-sidecar annotation, so the shim routes it to runc on the
# host while the workload runs inside the guest VM.
apiVersion: v1
kind: Pod
metadata:
  name: hostsidecar-e2e
  annotations:
    io.katacontainers.host-sidecar-containers: "host-proxy"
    # 64 MiB reserved for the host-proxy sidecar; shim subtracts from VM allocation.
    io.katacontainers.host-sidecar-mem-bytes: "67108864"
spec:
  runtimeClassName: kata
  initContainers:
    - name: host-proxy
      image: busybox:1.36
      restartPolicy: Always
      command: ["sleep", "100000"]
  containers:
    - name: workload
      image: busybox:1.36
      command: ["sleep", "100000"]
  terminationGracePeriodSeconds: 5
