# M5 demo: kata-dev-network-proxy as a host sidecar.
#
# Architecture
# ------------
#
#   pod netns
#   ┌────────────────────────────────────────────────────────────────────┐
#   │                                                                    │
#   │   Kata VM  ──tap0_kata──► iptables REDIRECT ──► net-proxy         │
#   │   (workload)                                    (host sidecar)    │
#   │                                                 CAP_NET_ADMIN     │
#   │                                                    │              │
#   │                                                    │ eth0         │
#   └────────────────────────────────────────────────────┼─────────────-┘
#                                                        ▼
#                                                 external network
#
# The net-proxy sidecar installs iptables REDIRECT rules that send:
#   - all TCP from the VM subnet to the transparent TCP proxy (port 12345)
#   - DNS UDP from the VM subnet to the split-horizon DNS (169.254.1.1:53)
#
# Killing or deleting the proxy severs all VM egress, proving there is no
# bypass path through the tap when the proxy is absent.
#
# Prerequisites
# -------------
#   1. kata-dev-network-proxy image loaded into the VM's container runtime:
#        docker build -t kata-dev-network-proxy:latest \
#          /path/to/kata-dev-network-proxy
#        ctr -n k8s.io images import ...
#   2. internetworking_model=none in configuration.toml (apply-config.sh).
#   3. Kata shim from em/host-sidecar deployed (deploy.sh).
#   4. CoreDNS cluster IP verified (default: 10.96.0.10).
#
# Apply
# -----
#   sudo k3s kubectl apply -f proxy-demo.yaml
#   sudo k3s kubectl wait --for=condition=Ready pod/proxy-demo --timeout=180s
#
# Verify interception
# -------------------
#   # VM can reach external HTTP through the proxy:
#   sudo k3s kubectl exec proxy-demo -c workload -- wget -qO- http://example.com
#
#   # Proxy logs show the intercepted connection:
#   sudo runc --root /run/kata-hostsidecar list
#   sudo runc --root /run/kata-hostsidecar exec <id> cat /proc/1/fd/1
#
#   # Kill the proxy, VM loses egress:
#   sudo k3s kubectl exec proxy-demo -c net-proxy -- kill 1
#   sudo k3s kubectl exec proxy-demo -c workload -- wget -qO- --timeout=5 http://example.com
#   # ↑ should time out / connection refused
#
# Clean up
# --------
#   sudo k3s kubectl delete pod proxy-demo
apiVersion: v1
kind: Pod
metadata:
  name: proxy-demo
  annotations:
    # Route the net-proxy sidecar to runc on the host.
    io.katacontainers.host-sidecar-containers: "net-proxy"
    # 64 MiB reserved for the proxy sidecar; shim subtracts from VM.
    io.katacontainers.host-sidecar-mem-bytes: "67108864"
spec:
  runtimeClassName: kata
  initContainers:
    # KEP-753 native sidecar: starts before the workload, runs for the pod's
    # lifetime.  The shim routes it to runc on the host.
    - name: net-proxy
      # Build from ddoghq-sandbox/kata-dev-network-proxy and import into the VM's
      # containerd: `ctr -n k8s.io images import proxy.tar`
      image: kata-dev-network-proxy:latest
      imagePullPolicy: Never
      restartPolicy: Always
      args:
        - --vm-subnet=192.168.100.0/24
        - --dns-listen=169.254.1.1:53
        - --cluster-dns=10.96.0.10:53
        - --upstream-dns=8.8.8.8:53
        - --proxy-port=12345
        - --log-level=info
      securityContext:
        runAsUser: 0
        capabilities:
          add:
            - NET_ADMIN   # required for iptables rule installation
            - NET_RAW     # required for SO_ORIGINAL_DST getsockopt
  containers:
    - name: workload
      image: busybox:1.36
      command: ["sleep", "86400"]
  terminationGracePeriodSeconds: 5
