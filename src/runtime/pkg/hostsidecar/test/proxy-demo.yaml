# M6 demo: kata-dev-network-proxy (tapnet mode) as a host sidecar.
#
# Architecture
# ------------
#
#   pod netns
#   ┌────────────────────────────────────────────────────────────────────┐
#   │                                                                    │
#   │   Kata VM  ──tap0_kata──► gvisor-tap-vsock (user-space TCP/IP)    │
#   │   (workload)  169.254.1.2   net-proxy / pkg/tapnet                │
#   │                             gateway 169.254.1.1    │              │
#   │                                                   eth0            │
#   └────────────────────────────────────────────────────┼─────────────-┘
#                                                        ▼
#                                                 external network
#
# The proxy owns the tap fd directly; the kernel never forwards VM frames.
# Kill-9 proof: tap fd closes on proxy exit, VM network goes dark immediately.
# No iptables rules are installed.
#
# Prerequisites
# -------------
#   1. Proxy image loaded (build-load-proxy.sh).
#   2. internetworking_model=tapnet (apply-config.sh, default).
#   3. Shim from em/host-sidecar deployed (deploy.sh).
#
# Apply
# -----
#   sudo k3s kubectl apply -f proxy-demo.yaml
#   sudo k3s kubectl wait --for=condition=Ready pod/proxy-demo --timeout=180s
#
# Verify
# ------
#   sudo k3s kubectl exec proxy-demo -c workload -- wget -qO- http://example.com
#   sudo k3s kubectl logs proxy-demo -c net-proxy
#
# Demonstrate kill-9 isolation
# ----------------------------
#   sudo k3s kubectl exec proxy-demo -c net-proxy -- kill -9 1
#   # VM immediately loses network (tap fd closed); KEP-753 restarts proxy after ~1s
#
# Clean up
# --------
#   sudo k3s kubectl delete pod proxy-demo
apiVersion: v1
kind: Pod
metadata:
  name: proxy-demo
  annotations:
    # Route the net-proxy sidecar to runc on the host.
    io.katacontainers.host-sidecar-containers: "net-proxy"
    # 64 MiB reserved for the proxy sidecar; shim subtracts from VM.
    io.katacontainers.host-sidecar-mem-bytes: "67108864"
spec:
  runtimeClassName: kata
  initContainers:
    # KEP-753 native sidecar: starts before the workload, runs for the pod's
    # lifetime.  The shim routes it to runc on the host.
    - name: net-proxy
      # Build from ddoghq-sandbox/kata-dev-network-proxy and import into the VM's
      # containerd: `ctr -n k8s.io images import proxy.tar`
      image: kata-dev-network-proxy:latest
      imagePullPolicy: Never
      restartPolicy: Always
      args:
        # tapnet mode (internetworking_model=tapnet):
        - --tapnet-socket=/run/kata-tapnet/tap0_kata.ctrl
        - --vm-subnet=169.254.1.0/30
        - --cluster-dns=10.43.0.10:53   # k3s; change to 10.96.0.10 for kubeadm
        - --upstream-dns=8.8.8.8:53
        # iptables mode (internetworking_model=none) — comment tapnet args above and
        # uncomment below:
        # - --vm-subnet=169.254.1.0/30
        # - --cluster-dns=10.43.0.10:53
        # - --upstream-dns=8.8.8.8:53
        # - --proxy-port=12345
        - --log-level=debug
      securityContext:
        runAsUser: 0
        capabilities:
          add:
            - NET_ADMIN   # iptables (iptables mode); no capabilities needed for tapnet
      volumeMounts:
        # tapnet: QEMU creates /run/kata-tapnet/tap0_kata.sock on the host;
        # this mount makes it accessible inside the container.
        - name: tapnet-socket-dir
          mountPath: /run/kata-tapnet
  volumes:
    - name: tapnet-socket-dir
      hostPath:
        path: /run/kata-tapnet
        type: DirectoryOrCreate
  containers:
    - name: workload
      image: busybox:1.36
      command: ["sleep", "86400"]
  terminationGracePeriodSeconds: 5
