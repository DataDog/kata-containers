# Demonstrates M4: host-sidecar routing via a single-shot init container.
#
# host-logger is a regular init container (no restartPolicy: Always) annotated
# as a host sidecar.  The shim routes it to runc on the host; it writes
# "$(uname -r)" to a shared emptyDir volume and exits 0.  The workload
# container, which runs inside the Kata guest VM, reads the host kernel string
# and appends its own "$(uname -r)" — giving two visibly different kernel
# versions in a single kubectl logs call.
#
# Apply:
#   sudo k3s kubectl apply -f kernel-compare.yaml
#   sudo k3s kubectl wait --for=condition=Succeeded pod/kernel-compare --timeout=120s
#   sudo k3s kubectl logs kernel-compare -c workload
#   # Expected output (values depend on your kernel versions):
#   #   host-kernel: 6.8.0-117-generic
#   #   guest-kernel: 6.18.28
#
# Clean up:
#   sudo k3s kubectl delete pod kernel-compare
apiVersion: v1
kind: Pod
metadata:
  name: kernel-compare
  annotations:
    io.katacontainers.host-sidecar-containers: "host-logger"
spec:
  runtimeClassName: kata
  restartPolicy: Never
  volumes:
    - name: data
      emptyDir: {}
  initContainers:
    - name: host-logger
      image: busybox:1.36
      command: ["sh", "-c", "uname -r > /data/host-kernel"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 32Mi
      volumeMounts:
        - name: data
          mountPath: /data
  containers:
    - name: workload
      image: busybox:1.36
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 32Mi
      command:
        - sh
        - -c
        - |
          echo "host-kernel: $(cat /data/host-kernel)"
          echo "guest-kernel: $(uname -r)"
      volumeMounts:
        - name: data
          mountPath: /data
