# Demonstrates M4: host-sidecar routing with kernel version comparison.
#
# The host-logger init container is routed to runc on the host by the shim;
# the workload container runs inside the Kata guest VM. Both print their
# kernel version on startup, so the two values are visibly different.
#
# Prerequisites:
#   - Kata shim from branch em/host-sidecar deployed via hostsidecar/test/deploy.sh
#   - runtimeClassName "kata" registered in k3s
#
# Apply:
#   sudo k3s kubectl apply -f kernel-compare.yaml
#   sudo k3s kubectl wait --for=condition=Ready pod/kernel-compare --timeout=120s
#
# Observe host sidecar (runs on the host — prints host kernel):
#   sudo runc --root /run/kata-hostsidecar list
#   sudo runc --root /run/kata-hostsidecar exec kernel-compare-<id> cat /tmp/kernel
#
# Observe workload (runs in the VM — prints guest kernel):
#   sudo k3s kubectl exec kernel-compare -c workload -- uname -r
#
# The two kernel strings differ: the host sidecar shows the Lima VM's kernel
# (e.g. 6.8.0-117-generic) while the workload shows the Kata guest kernel
# (e.g. 6.18.28 from kata-static 3.31.0).
#
# Verify the sidecar is on the host, not in the VM:
#   host_kernel=$(uname -r)
#   guest_kernel=$(sudo k3s kubectl exec kernel-compare -c workload -- uname -r)
#   echo "host: $host_kernel  guest: $guest_kernel"
#   # expect: two different strings
#
# Clean up:
#   sudo k3s kubectl delete pod kernel-compare
apiVersion: v1
kind: Pod
metadata:
  name: kernel-compare
  annotations:
    # Route the host-logger sidecar to runc on the host instead of into the VM.
    io.katacontainers.host-sidecar-containers: "host-logger"
    # Reserve 32 MiB for the sidecar; shim subtracts this from the VM allocation.
    io.katacontainers.host-sidecar-mem-bytes: "33554432"
spec:
  runtimeClassName: kata
  initContainers:
    # KEP-753 native sidecar: restartPolicy:Always means kubelet treats this as a
    # long-running sidecar, not a one-shot init container.  The shim sees the
    # io.katacontainers.host-sidecar-containers annotation and routes it to runc.
    - name: host-logger
      image: busybox:1.36
      restartPolicy: Always
      command:
        - sh
        - -c
        - |
          echo "HOST KERNEL: $(uname -r)"
          uname -r > /tmp/kernel
          sleep 86400
  containers:
    - name: workload
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "GUEST KERNEL: $(uname -r)"
          sleep 86400
  terminationGracePeriodSeconds: 5
